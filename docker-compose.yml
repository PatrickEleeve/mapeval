version: "3.8"

x-mapeval-common: &mapeval-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    - LOG_LEVEL=INFO
    - LOG_JSON=false
  volumes:
    - ./logs:/app/logs
    - ./.cache:/app/.cache
  restart: unless-stopped

services:
  mapeval:
    <<: *mapeval-common
    container_name: mapeval-sim
    command:
      [
        "--non-interactive",
        "--execution-mode",
        "simulation",
        "--duration",
        "1h",
        "--symbols",
        "BTCUSDT",
        "ETHUSDT",
        "--llm-provider",
        "openai",
      ]

  mapeval-paper:
    <<: *mapeval-common
    container_name: mapeval-paper
    command:
      [
        "--non-interactive",
        "--execution-mode",
        "paper",
        "--enable-api",
        "--duration",
        "1h",
        "--symbols",
        "BTCUSDT",
        "ETHUSDT",
        "--llm-provider",
        "openai",
      ]
    profiles:
      - paper

  mapeval-live-testnet:
    <<: *mapeval-common
    container_name: mapeval-live-testnet
    command:
      [
        "--non-interactive",
        "--execution-mode",
        "live",
        "--allow-live-trading",
        "--binance-testnet",
        "--live-confirmation",
        "ENABLE BINANCE TESTNET LIVE",
        "--enable-api",
        "--duration",
        "1h",
        "--symbols",
        "BTCUSDT",
        "ETHUSDT",
        "--llm-provider",
        "openai",
      ]
    profiles:
      - live

  mapeval-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mapeval-test
    environment:
      - LOG_LEVEL=INFO
    entrypoint: ["pytest"]
    command: ["tests/", "-q"]
    profiles:
      - test
